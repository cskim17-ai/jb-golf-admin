name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 1. 권한 설정 추가 (중요!)
    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # 2. 빌드된 결과물(dist 폴더)을 업로드하는 단계 추가
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite를 쓰신다면 보통 dist입니다.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
